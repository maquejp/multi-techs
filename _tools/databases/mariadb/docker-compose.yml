services:
  multitech-mariadb-server:
    image: mariadb:latest
    container_name: multitech-mariadb-server
    environment:
      - MARIADB_ROOT_PASSWORD=a-nice-admin-password
      - MARIADB_USER=mariadbadmin
      - MARIADB_PASSWORD=a-nice-admin-password
    ports:
      - "3306:3306"
    volumes:
      - ../../../databases/mariadb/data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "mariadbadmin",
          "-p$a-nice-admin-password",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

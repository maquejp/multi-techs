version: "3.8"

services:
  multitech-mongodb-server:
    image: mongodb/mongodb-community-server:latest
    container_name: multitech-mongodb-server
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongoadmin
      - MONGO_INITDB_ROOT_PASSWORD=a-nice-admin-password
    ports:
      - "27017:27017"
    volumes:
      - ../../../databases/mongodb/data:/data/db
      - ../../../databases/mongodb/config:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

